<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" width="720" height="300" role="img" aria-label="Greens Family 918 — retail concept rendering">
  <defs>
    <linearGradient id="sky2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#eef3f8"/>
      <stop offset="1" stop-color="#d7e2ee"/>
    </linearGradient>
    <linearGradient id="ground2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c7d4e2"/>
      <stop offset="1" stop-color="#aebfd1"/>
    </linearGradient>
  </defs>
  <rect width="720" height="300" fill="url(#sky2)"/>
  <g stroke="#9fb2c7" stroke-width="1" opacity="0.35">
    <path d="M0 60 H720 M0 120 H720 M0 180 H720 M0 240 H720"/>
    <path d="M120 0 V300 M240 0 V300 M360 0 V300 M480 0 V300 M600 0 V300"/>
  </g>
  <rect y="248" width="720" height="52" fill="url(#ground2)"/>
  <!-- drive-thru lane -->
  <g stroke="#ffffff" stroke-width="3" stroke-dasharray="14 12" opacity="0.85">
    <path d="M40 270 H680"/>
  </g>
  <g fill="#ffffff" stroke="#334e68" stroke-width="3.5" stroke-linejoin="round" stroke-linecap="round">
    <!-- store body -->
    <rect x="232" y="138" width="256" height="110"/>
    <!-- parapet -->
    <rect x="222" y="120" width="276" height="22" fill="#dbe6f1"/>
    <!-- awning -->
    <path d="M232 178 H488 L470 200 H250 Z" fill="#2f855a" stroke="#276749"/>
    <!-- door -->
    <rect x="332" y="206" width="56" height="42" fill="#cdd9e7"/>
    <path d="M360 206 V248" stroke-width="2"/>
    <!-- windows -->
    <rect x="252" y="208" width="62" height="40" fill="#eaf1f8"/>
    <rect x="406" y="208" width="62" height="40" fill="#eaf1f8"/>
    <!-- pole sign -->
    <path d="M548 248 V150" stroke-width="5"/>
    <rect x="520" y="116" width="56" height="38" rx="6" fill="#2f855a" stroke="#276749"/>
  </g>
  <g font-family="'Segoe UI', Arial, sans-serif">
    <text x="548" y="140" fill="#ffffff" font-size="13" font-weight="800" letter-spacing="1" text-anchor="middle">OPEN</text>
    <rect x="24" y="24" width="92" height="24" rx="12" fill="#334e68"/>
    <text x="70" y="40" fill="#ffffff" font-size="12" font-weight="700" letter-spacing="1.5" text-anchor="middle">GREENS</text>
    <rect x="24" y="252" width="232" height="26" rx="13" fill="#ffffff" opacity="0.92"/>
    <text x="38" y="269" fill="#334e68" font-size="11.5" font-weight="600" letter-spacing="0.5">Concept rendering · Retail / Drive-Thru</text>
  </g>
</svg>
