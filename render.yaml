services:
  - type: web
    name: greens-nexus-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: UNIFI_API_KEY
        sync: false
      - key: UNIFI_BASE_URL
        sync: false
